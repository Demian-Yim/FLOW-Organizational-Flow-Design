<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOW~ | 사람과 조직의 흐름을 디자인합니다</title>
    
    <!-- Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Fonts for Experience Tools & Branding -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Black+Han+Sans&family=JetBrains+Mono:wght@400;800&family=Gamja+Flower&family=Jua&family=Nanum+Pen+Script&family=Space+Mono:ital,wght@0,400;0,700;1,700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                        jua: ['Jua', 'sans-serif'],
                        gamja: ['Gamja Flower', 'cursive'],
                        hand: ['Nanum Pen Script', 'cursive'],
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Black Han Sans', 'sans-serif'],
                        space: ['Space Mono', 'monospace'],
                        syne: ['Syne', 'sans-serif'],
                        flow: ['Audiowide', 'cursive'], // New Flow Font
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            cyan: '#06b6d4',
                            blue: '#3b82f6',
                            purple: '#8b5cf6',
                            pastelCyan: '#A5F3FC', // For light mode/pastel theme
                            pastelBlue: '#BFDBFE',
                            pastelPurple: '#E9D5FF',
                            pastelPink: '#FBCFE8'
                        }
                    },
                    animation: {
                        'marquee': 'marquee 25s linear infinite',
                        'blob': 'blob 7s infinite',
                        'fadeIn': 'fadeIn 0.5s ease-out forwards',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #06b6d4;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        /* Global Noise Texture - Enhanced Visibility */
        .bg-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.07; /* Increased opacity for more texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "three": "https://esm.sh/three@^0.182.0",
    "@emailjs/browser": "https://esm.sh/@emailjs/browser@^4.3.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
</head>
<body class="bg-gray-50 text-slate-800 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300 overflow-x-hidden selection:bg-brand-cyan selection:text-slate-900">
    <div class="bg-texture"></div>
    <div id="root"></div>
</body>
</html>
